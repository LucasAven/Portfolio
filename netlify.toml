# Single bilingual page (in-page ES/EN toggle), no per-language redirects.
# Catch-all 404 fallback for unmatched routes.

[build]
  command = "npm run build:css"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
    from = "/*"
    to = "/404.html"
    status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = false

[build.processing.js]
  bundle = true
  minify = false

[build.processing.html]
  pretty_urls = true
