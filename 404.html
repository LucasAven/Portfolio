<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Lucas Avendaño</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dist/tailwind.css" />
  </head>
  <body id="top">
    <div class="fixed inset-0 z-0 pointer-events-none opacity-100 transition-opacity duration-[.9s] ease-[ease]" aria-hidden="true">
      <div class="paper-bg"></div>
      <div class="halftone"></div>
    </div>
    <div class="grain" aria-hidden="true"></div>

    <main class="relative z-2 w-full max-w-(--maxw) mx-auto px-(--gut) min-h-screen flex flex-col justify-center items-start gap-[.4rem]">
      <p class="inline-flex items-center gap-[.7em] font-mono text-[.8rem] tracking-[.18em] uppercase text-ink bg-acc px-[.7em] py-[.3em] rotate-[-1.5deg] rounded-full mb-[.6rem]"><span class="font-bold text-ink">404</span><span id="err-kicker" data-i18n="err.kicker">Página no encontrada</span></p>
      <div class="err-404" aria-hidden="true">404</div>
      <p class="font-hand text-[1.7rem] text-acc3 rotate-[-4deg] mt-[.4rem] mb-[.2rem]" id="err-note" data-i18n="err.note">¿perdido en la marea?</p>
      <h1 class="err-title" id="err-title" data-i18n="err.title">Te perdiste en el <em>mar</em></h1>
      <p class="font-serif text-[1.12rem] leading-[1.6] max-w-[50ch] text-ink mt-[.7rem]" id="err-sub" data-i18n="err.sub">La página que buscás no existe o se fue con la corriente. Pero tranquilo: la orilla está a un clic.</p>
      <div class="flex flex-wrap gap-[.8rem] mt-[1.6rem]">
        <a id="home-link" data-i18n="err.home" href="/" class="inline-flex items-center gap-[.5em] font-semibold cursor-pointer transition-[transform,background,box-shadow,color] duration-200 ease-[ease] will-change-transform bg-ink text-paper px-[1.5em] py-[.85em] rounded-full font-mono uppercase text-[.78rem] tracking-[.06em] shadow-[3px_3px_0_var(--acc)] hover:-translate-x-px hover:-translate-y-px hover:shadow-[4px_4px_0_var(--acc)]">Volver al inicio</a>
        <a id="contact-link" data-i18n="err.contact" href="/#contact" class="inline-flex items-center gap-[.5em] font-semibold cursor-pointer transition-[transform,background,box-shadow,color] duration-200 ease-[ease] will-change-transform bg-transparent text-ink px-[1.5em] py-[.85em] rounded-full font-mono uppercase text-[.78rem] tracking-[.06em] shadow-[inset_0_0_0_2px_var(--ink)]">Contactar</a>
      </div>
    </main>

    <script src="js/surf-motifs.js"></script>
    <script>
      buildSurfMotifs([
        ["board","top:7%","right:5%",64,.5,"ink",8],
        ["sun","top:6%","left:5%",120,.42,"gold",0],
        ["starfish","top:30%","left:4%",88,.5,"ink",-10],
        ["palm","top:24%","right:6%",98,.5,"ink",6],
        ["spiral","top:58%","left:6%",70,.5,"gold",0],
        ["shell","top:60%","right:5%",92,.45,"ink",0],
        ["wave","bottom:8%","left:5%",122,.5,"ink",0],
        ["flower","bottom:10%","right:7%",82,.5,"gold",0],
        ["squiggle","bottom:32%","right:30%",112,.42,"ink",-6],
        ["starfish","bottom:12%","right:22%",70,.5,"cream",16]
      ], { height: "100%" });
    </script>

    <!-- bilingual copy, shared with the main page; follows the previously chosen language -->
    <script src="js/i18n.js"></script>
    <script>
      (function () {
        var lang = "es";
        try { if (localStorage.getItem("portfolio-lang") === "en") lang = "en"; } catch (e) {}
        applyLang(lang);
      })();
    </script>
  </body>
</html>
